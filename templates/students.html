<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
</head>
<body>

<h1>Students List</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Year</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>{{ student[4] }}</td>
    <td>
        <a href="/delete/{{ student[0] }}">Delete</a>
    </td>
</tr>
    {% endfor %}

</table>

<br>
<a href="/">Go Back</a>

</body>
</html>
